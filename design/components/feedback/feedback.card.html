<!-- @dsCard group="Components" viewport="700x520" name="Feedback · Toast, empty state & ritual cards" subtitle="Toast, EmptyState, RitualCard (fold · ripple · stardust · lastfold)" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);color:var(--text);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:20px}
  .label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint)}
  .row{display:flex;flex-wrap:wrap;align-items:center;gap:12px}
  .cards{display:flex;gap:16px;overflow-x:auto;padding-bottom:6px}
  .cards > *{flex:none;transform:scale(.72);transform-origin:top left;margin-right:-100px;margin-bottom:-170px}
  .empty-box{border:1px dashed var(--border-hover);border-radius:16px;background:var(--surface);min-width:260px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Toast, EmptyState, RitualCard } = window.MitlesenDesignSystem_737635;
function Demo() {
  return (
    <div className="wrap">
      <div>
        <div className="label" style={{marginBottom:9}}>Toasts &amp; empty state</div>
        <div className="row">
          <Toast icon="✎">批注留下了</Toast>
          <Toast loading>导入《book.epub》…</Toast>
          <Toast>这章读完了 ✓</Toast>
          <div className="empty-box"><EmptyState>从左边的书架挑一本，<br/>翻开一章一起读。</EmptyState></div>
        </div>
      </div>
      <div>
        <div className="label" style={{marginBottom:9}}>Ritual cards</div>
        <div className="cards">
          <RitualCard art="fold" title="共读" subtitle="Anthropic · On honesty" quote="两个人一起停留的地方。" note="Read together, once at the same sentence." footer="这里有两个人的折痕。" />
          <RitualCard art="ripple" title="回声" subtitle="Rilke · Letter 1" quote="此处有回声。" note="A note worth keeping." footer="a quiet mark left on the page" />
          <RitualCard art="stardust" title="尘迹" subtitle="Calvino" quote="星尘落在页边。" note="A small card from the margin." footer="dust trace" />
          <RitualCard art="lastfold" title="Letters to a Young Poet" subtitle="Rilke" quote="书合上了，但页边还醒着。" note="12 chunks · 5 notes" footer="Choose one sentence to carry forward." />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
