<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);color:var(--text);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:22px;display:grid;grid-template-columns:250px 1fr;gap:20px;align-items:start}
  .col{display:flex;flex-direction:column;gap:10px;min-width:0}
  .label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin:2px 0}
  .toc{display:flex;flex-direction:column;gap:2px;padding-left:6px;border-left:1px dashed var(--border-hover)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { BookCard, ChapterRow, Sheet, Highlight, MarginNote } = window.MitlesenDesignSystem_737635;
function Demo() {
  return (
    <div className="wrap">
      <div className="col">
        <span className="label">Bookshelf</span>
        <BookCard title="The Anthropic Guidelines" author="Anthropic" read={3} total={12} annotationCount={5} active />
        <BookCard title="Letters to a Young Poet" author="Rilke" read={0} total={10} />
        <div className="toc">
          <ChapterRow title="Claude and the mission" read />
          <ChapterRow title="On honesty" current annotationCount={2} />
          <ChapterRow title="The finish ritual" />
        </div>
      </div>
      <div className="col">
        <span className="label">Reading sheet</span>
        <Sheet>
          它不是一次性的摘要，而是<Highlight by="human">两个人一起停留</Highlight>的地方——
          一句被<Highlight by="ai" active>共同划下</Highlight>的话，落在页边，成为回声。
        </Sheet>
        <span className="label" style={{marginTop:6}}>页边批注</span>
        <MarginNote persona="ai" quote="两个人一起停留" onReply={()=>{}} replyCount={1}>
          This is not a summary. It is a resonance marker.
        </MarginNote>
        <MarginNote persona="human" quote="共同划下" open>
          我也在这句停住了。留给小奏。
        </MarginNote>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
