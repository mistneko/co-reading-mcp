<!-- @dsCard group="Brand" viewport="700x220" name="Iconography · paw & glyphs" subtitle="小奏's paw stamp + the typographic icon set" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);font-family:var(--font-sans);color:var(--text)}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:18px}
  .top{display:flex;align-items:center;gap:20px}
  .pawbox{width:84px;height:84px;border-radius:18px;background:var(--grad-paper);border:1px solid var(--border);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;flex:none}
  .pawbox img{width:46px;height:46px;transform:rotate(-11deg);opacity:.85}
  .lead{font-size:13px;color:var(--text-mid);line-height:1.55;max-width:460px}
  .lead b{color:var(--text);font-weight:600}
  .glyphs{display:flex;flex-wrap:wrap;gap:10px}
  .g{width:44px;height:44px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text-mid);font-size:19px;display:flex;align-items:center;justify-content:center}
  .cap{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint)}
</style>
<div class="wrap">
  <div class="top">
    <div class="pawbox"><img src="../assets/paw.svg" alt="paw stamp"></div>
    <div class="lead"><b>The paw stamp</b> signs every margin note 小奏 leaves — inked through an SVG turbulence filter so it reads as hand-stamped. <code>assets/paw.svg</code>. Copy it in; never redraw it.</div>
  </div>
  <div>
    <div class="cap" style="margin-bottom:9px">Typographic icons — no icon font</div>
    <div class="glyphs">
      <div class="g">☰</div><div class="g">↻</div><div class="g">＋</div><div class="g">◐</div><div class="g">‹</div><div class="g">›</div><div class="g">✍</div><div class="g">✎</div><div class="g">✒</div><div class="g">✓</div><div class="g">→</div><div class="g">✕</div>
    </div>
  </div>
</div>
