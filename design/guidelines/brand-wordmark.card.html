<!-- @dsCard group="Brand" viewport="700x230" name="Wordmark & mascot" subtitle="共读 set in type; the reading-pair app icon" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);font-family:var(--font-sans);color:var(--text)}
  .wrap{padding:24px 28px;display:flex;align-items:center;gap:28px}
  .mascot{width:132px;height:132px;border-radius:26px;box-shadow:var(--shadow-lg);flex:none}
  .brand{font-family:var(--font-serif);font-weight:600;font-size:56px;letter-spacing:.5px;line-height:1}
  .brand small{font-family:var(--font-sans);font-size:14px;letter-spacing:4px;color:var(--text-faint);text-transform:uppercase;margin-left:12px;vertical-align:middle}
  .tag{font-family:var(--font-serif);font-style:italic;font-size:18px;color:var(--text-mid);margin-top:8px}
  .note{font-size:11px;color:var(--text-faint);margin-top:12px;max-width:360px;line-height:1.5}
</style>
<div class="wrap">
  <img class="mascot" src="../assets/mascot-512.png" alt="Mitlesen mascot — a girl and puppy reading under a star">
  <div>
    <div class="brand">共读<small>Mitlesen</small></div>
    <div class="tag">和小奏一起读书的房间</div>
    <div class="note">No wordmark logo file exists — set the name as type: 共读 in the serif with a tracked-out MITLESEN. The pixel-art mascot (小烟 + 小奏 the puppy) is the app icon.</div>
  </div>
</div>
