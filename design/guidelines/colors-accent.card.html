<!-- @dsCard group="Colors" viewport="700x150" name="Periwinkle accent" subtitle="小奏's hue — the one interactive colour" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);font-family:var(--font-sans);color:var(--text)}
  .row{display:flex;gap:12px;padding:20px}
  .chip{flex:1;display:flex;flex-direction:column;gap:7px}
  .sw{height:60px;border-radius:12px;border:1px solid var(--border)}
  .n{font-size:12px;font-weight:600}
  .h{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
  .tok{font-size:10px;color:var(--text-faint)}
</style>
<div class="row">
  <div class="chip"><div class="sw" style="background:var(--accent)"></div><div class="n">Accent</div><div class="h">#7B8EC6</div><div class="tok">--accent</div></div>
  <div class="chip"><div class="sw" style="background:var(--accent-deep)"></div><div class="n">Deep</div><div class="h">#5E6FA8</div><div class="tok">--accent-deep</div></div>
  <div class="chip"><div class="sw" style="background:var(--grad-accent)"></div><div class="n">Gradient</div><div class="h">135° CTA</div><div class="tok">--grad-accent</div></div>
  <div class="chip"><div class="sw" style="background:var(--accent-med)"></div><div class="n">Medium</div><div class="h">22% tint</div><div class="tok">--accent-med</div></div>
  <div class="chip"><div class="sw" style="background:var(--accent-soft)"></div><div class="n">Soft</div><div class="h">10% wash</div><div class="tok">--accent-soft</div></div>
</div>
