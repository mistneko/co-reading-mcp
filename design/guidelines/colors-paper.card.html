<!-- @dsCard group="Colors" viewport="700x160" name="Letter-paper · 信纸" subtitle="The warm, physical page — theme-independent" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--grad-paper);font-family:var(--font-sans);color:var(--vk-ink)}
  .row{display:flex;gap:12px;padding:20px}
  .chip{flex:1;display:flex;flex-direction:column;gap:7px}
  .sw{height:60px;border-radius:12px;border:1px solid rgba(176,110,90,.28)}
  .n{font-size:12px;font-weight:600}
  .h{font-size:11px;color:var(--vk-ink-dim);font-variant-numeric:tabular-nums}
  .tok{font-size:10px;color:var(--vk-ink-dim)}
</style>
<div class="row">
  <div class="chip"><div class="sw" style="background:var(--vk-paper)"></div><div class="n">Paper</div><div class="h">#FBF8F1</div><div class="tok">--vk-paper</div></div>
  <div class="chip"><div class="sw" style="background:var(--vk-paper2)"></div><div class="n">Paper edge</div><div class="h">#F3EEE2</div><div class="tok">--vk-paper2</div></div>
  <div class="chip"><div class="sw" style="background:var(--vk-ink)"></div><div class="n">Ink</div><div class="h">#4A4438</div><div class="tok">--vk-ink</div></div>
  <div class="chip"><div class="sw" style="background:var(--vk-ink-dim)"></div><div class="n">Faded ink</div><div class="h">#8A8270</div><div class="tok">--vk-ink-dim</div></div>
  <div class="chip"><div class="sw" style="background:var(--vk-gold)"></div><div class="n">Wax gold</div><div class="h">#C9A86A</div><div class="tok">--vk-gold</div></div>
</div>
