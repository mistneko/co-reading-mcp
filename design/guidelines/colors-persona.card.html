<!-- @dsCard group="Colors" viewport="700x150" name="Persona & semantic" subtitle="小烟 rose, 小奏 periwinkle, mint = read" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);font-family:var(--font-sans);color:var(--text)}
  .row{display:flex;gap:12px;padding:20px}
  .chip{flex:1;display:flex;flex-direction:column;gap:7px}
  .sw{height:60px;border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:18px;font-weight:600;color:#fff}
  .n{font-size:12px;font-weight:600}
  .h{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
  .tok{font-size:10px;color:var(--text-faint)}
</style>
<div class="row">
  <div class="chip"><div class="sw" style="background:var(--rose)">小烟</div><div class="n">Human</div><div class="h">#B06B7A</div><div class="tok">--rose / --persona-human</div></div>
  <div class="chip"><div class="sw" style="background:var(--accent-deep)">小奏</div><div class="n">Claude</div><div class="h">#5E6FA8</div><div class="tok">--persona-ai</div></div>
  <div class="chip"><div class="sw" style="background:var(--mint)">✓</div><div class="n">Read / done</div><div class="h">#7AB5A0</div><div class="tok">--mint / --success</div></div>
  <div class="chip"><div class="sw" style="background:var(--lavender)"></div><div class="n">Lavender</div><div class="h">#C0B3D9</div><div class="tok">--lavender</div></div>
</div>
