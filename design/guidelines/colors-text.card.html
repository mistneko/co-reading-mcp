<!-- @dsCard group="Colors" viewport="700x150" name="Text ramp" subtitle="Four cool-ink weights, primary to faint" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);font-family:var(--font-sans);color:var(--text)}
  .row{display:flex;gap:12px;padding:20px}
  .chip{flex:1;display:flex;flex-direction:column;gap:6px}
  .aa{font-family:var(--font-serif);font-size:34px;font-weight:600;line-height:1.1}
  .n{font-size:12px;font-weight:600}
  .h{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
  .tok{font-size:10px;color:var(--text-faint)}
</style>
<div class="row">
  <div class="chip"><div class="aa" style="color:var(--text)">Aa 共读</div><div class="n">Primary</div><div class="h">#2D3142</div><div class="tok">--text</div></div>
  <div class="chip"><div class="aa" style="color:var(--text-mid)">Aa 共读</div><div class="n">Secondary</div><div class="h">#555B74</div><div class="tok">--text-mid</div></div>
  <div class="chip"><div class="aa" style="color:var(--text-dim)">Aa 共读</div><div class="n">Meta</div><div class="h">#8A90A8</div><div class="tok">--text-dim</div></div>
  <div class="chip"><div class="aa" style="color:var(--text-faint)">Aa 共读</div><div class="n">Faint</div><div class="h">#B0B5C8</div><div class="tok">--text-faint</div></div>
</div>
