<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing scale" subtitle="A calm 2px-based rhythm" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);font-family:var(--font-sans);color:var(--text)}
  .wrap{padding:20px 26px;display:flex;flex-direction:column;gap:7px}
  .r{display:flex;align-items:center;gap:12px}
  .r .lab{width:120px;flex:none;font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
  .bar{height:14px;border-radius:4px;background:var(--grad-accent)}
</style>
<div class="wrap">
  <div class="r"><span class="lab">--space-2 · 4</span><span class="bar" style="width:4px"></span></div>
  <div class="r"><span class="lab">--space-4 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="r"><span class="lab">--space-6 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="r"><span class="lab">--space-8 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="r"><span class="lab">--space-9 · 18 (card)</span><span class="bar" style="width:18px"></span></div>
  <div class="r"><span class="lab">--space-12 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="r"><span class="lab">--space-14 · 28</span><span class="bar" style="width:28px"></span></div>
  <div class="r"><span class="lab">--space-16 · 34 (sheet)</span><span class="bar" style="width:34px"></span></div>
  <div class="r"><span class="lab">--space-20 · 40</span><span class="bar" style="width:40px"></span></div>
</div>
