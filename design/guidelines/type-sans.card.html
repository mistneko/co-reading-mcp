<!-- @dsCard group="Type" viewport="700x200" name="Sans UI · DM Sans" subtitle="All chrome, labels and controls" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);font-family:var(--font-sans);color:var(--text)}
  .wrap{padding:24px 26px;display:flex;flex-direction:column;gap:14px}
  .lg{font-size:19px;font-weight:600}
  .body{font-size:15px;line-height:1.6;color:var(--text-mid);max-width:560px}
  .weights{display:flex;gap:20px;font-size:17px}
  .weights span{display:flex;flex-direction:column;gap:2px}
  .weights small{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint)}
  .tok{font-size:10px;color:var(--text-faint)}
</style>
<div class="wrap">
  <div class="eyebrow">书架 · Bibliothek</div>
  <div class="lg">和小奏一起读书的房间</div>
  <div class="body">从左边的书架挑一本，翻开一章一起读。留下批注，也可以是一个问题，交给小奏。</div>
  <div class="weights">
    <span style="font-weight:300">Aa 阅读<small>300 Light</small></span>
    <span style="font-weight:400">Aa 阅读<small>400 Regular</small></span>
    <span style="font-weight:500">Aa 阅读<small>500 Medium</small></span>
    <span style="font-weight:600">Aa 阅读<small>600 Semibold</small></span>
  </div>
  <div class="tok">--font-sans · DM Sans, -apple-system, Helvetica Neue, sans-serif</div>
</div>
