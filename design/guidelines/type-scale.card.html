<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);font-family:var(--font-sans);color:var(--text)}
  .wrap{padding:20px 26px;display:flex;flex-direction:column;gap:8px}
  .r{display:flex;align-items:baseline;gap:14px}
  .r .lab{width:150px;flex:none;font-size:10px;color:var(--text-faint);font-variant-numeric:tabular-nums}
  .s{font-family:var(--font-serif);font-weight:600;line-height:1.05;white-space:nowrap}
</style>
<div class="wrap">
  <div class="r"><span class="lab">--text-display · 42</span><span class="s" style="font-size:42px">共读 Mitlesen</span></div>
  <div class="r"><span class="lab">--text-title · 34</span><span class="s" style="font-size:34px">Ritual card</span></div>
  <div class="r"><span class="lab">--text-heading · 24</span><span class="s" style="font-size:24px">Chapter title</span></div>
  <div class="r"><span class="lab">--text-subhead · 19</span><span class="s" style="font-size:19px">Bibliothek</span></div>
  <div class="r"><span class="lab">--text-lg · 17</span><span class="s" style="font-size:17px">Book title</span></div>
  <div class="r"><span class="lab">--text-body-size · 15</span><span class="s" style="font-size:15px;font-family:var(--font-sans);font-weight:400">Body / UI text</span></div>
  <div class="r"><span class="lab">--text-sm · 13</span><span class="s" style="font-size:13px;font-family:var(--font-sans);font-weight:400">Controls · meta</span></div>
  <div class="r"><span class="lab">--text-xs · 11</span><span class="s" style="font-size:11px;font-family:var(--font-sans);font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint)">Eyebrow</span></div>
</div>
