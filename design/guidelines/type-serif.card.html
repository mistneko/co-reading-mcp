<!-- @dsCard group="Type" viewport="700x210" name="Serif display · Cormorant + Noto Serif SC" subtitle="The brand voice: Latin in Cormorant, CJK in Noto Serif SC" -->
<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);font-family:var(--font-serif);color:var(--text)}
  .wrap{padding:24px 26px;display:flex;flex-direction:column;gap:14px}
  .brand{font-size:52px;font-weight:600;letter-spacing:.5px;line-height:1}
  .brand small{font-family:var(--font-sans);font-size:13px;letter-spacing:3px;color:var(--text-faint);text-transform:uppercase;margin-left:12px;vertical-align:middle}
  .title{font-size:28px;font-weight:600}
  .italic{font-style:italic;color:var(--text-mid)}
  .weights{display:flex;gap:22px;font-size:22px}
  .weights span{display:flex;flex-direction:column}
  .weights small{font-family:var(--font-sans);font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px}
  .tok{font-family:var(--font-sans);font-size:10px;color:var(--text-faint)}
</style>
<div class="wrap">
  <div class="brand">共读<small>Mitlesen</small></div>
  <div class="title">Bibliothek · Nachklang</div>
  <div class="italic" style="font-size:20px">Letters to a Young Poet — Rainer Maria Rilke</div>
  <div class="weights">
    <span>Nachklang<small>400 Regular</small></span>
    <span style="font-weight:500">Nachklang<small>500 Medium</small></span>
    <span style="font-weight:600">Nachklang<small>600 Semibold</small></span>
  </div>
  <div class="tok">--font-serif · Cormorant Garamond, Songti SC, Noto Serif SC, serif</div>
</div>
