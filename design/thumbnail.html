<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0;height:100%}
  .tile{width:1280px;height:854px;display:flex;font-family:var(--font-serif)}
  .main{flex:1;background:var(--accent);display:flex;align-items:center;justify-content:center}
  .name{color:#fff;font-weight:600;font-size:230px;letter-spacing:4px;line-height:.9;text-align:center}
  .name small{display:block;font-family:var(--font-sans);font-size:52px;letter-spacing:22px;font-weight:500;opacity:.82;margin-top:20px;text-transform:uppercase}
  .strip{width:150px;display:flex;flex-direction:column}
  .strip span{flex:1}
</style>
</head>
<body>
<div class="tile">
  <div class="main"><div class="name">共读<small>Mitlesen</small></div></div>
  <div class="strip">
    <span style="background:var(--lavender)"></span>
    <span style="background:var(--vk-gold)"></span>
    <span style="background:var(--rose)"></span>
    <span style="background:var(--accent-deep)"></span>
  </div>
</div>
</body>
</html>
