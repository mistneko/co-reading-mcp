<!-- @dsCard group="Mitlesen Mobile" viewport="390x844" name="共读 · Mitlesen — mobile PWA" subtitle="Immersive mobile redesign: shelf, immersive reader, letters, me" -->
<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>共读 · Mitlesen</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{height:100%}
  body{margin:0;background:#c9d0e0;font-family:var(--font-sans);-webkit-font-smoothing:antialiased;display:flex;justify-content:center}
  *{-webkit-tap-highlight-color:transparent}

  /* —— standalone phone screen (no browser chrome = PWA) —— */
  .phone{position:relative;width:390px;height:844px;overflow:hidden;background:var(--bg);background-image:var(--texture-dots);color:var(--text);display:flex;flex-direction:column;--pt:18px;--pb:22px}
  .status{height:var(--pt);display:flex;align-items:center;justify-content:space-between;padding:14px 24px 2px;font-size:14px;font-weight:600;color:var(--text);flex:none;letter-spacing:.02em}
  .status .r{display:flex;gap:7px;align-items:center;font-size:12px;font-weight:600}
  .bat{width:22px;height:11px;border:1.3px solid var(--text);border-radius:3px;position:relative;opacity:.9}
  .bat::after{content:'';position:absolute;right:-3px;top:3px;width:2px;height:5px;background:var(--text);border-radius:0 1px 1px 0}
  .bat::before{content:'';position:absolute;left:1.5px;top:1.5px;bottom:1.5px;width:72%;background:var(--text);border-radius:1px}

  .screen{flex:1;min-height:0;display:flex;flex-direction:column;position:relative}
  .body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}

  /* —— app header —— */
  .apphead{padding:10px 20px 8px;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex:none}
  .apphead .brand{font-family:var(--font-serif);font-weight:600;font-size:26px;line-height:1;letter-spacing:.5px}
  .apphead .brand small{font-family:var(--font-sans);font-size:10px;letter-spacing:2px;color:var(--text-faint);text-transform:uppercase;display:block;margin-top:5px}
  .apphead .eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint)}
  .hicon{display:flex;gap:8px}

  /* —— bottom tab bar —— */
  .tabbar{flex:none;display:flex;padding:8px 12px calc(var(--pb) + 6px);gap:4px;background:var(--surface);backdrop-filter:blur(var(--blur-panel));border-top:1px solid var(--border);position:relative;z-index:20}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;cursor:pointer;padding:6px 0 2px;color:var(--text-faint);font-family:inherit;min-height:48px}
  .tab .g{font-size:20px;line-height:1}
  .tab .t{font-size:10.5px;letter-spacing:.5px}
  .tab.on{color:var(--accent-deep)}
  .tab .dot{height:5px;display:flex;align-items:center}

  /* —— shelf —— */
  .shelf{padding:6px 18px 24px;display:flex;flex-direction:column;gap:12px}
  .searchbar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:11px 16px;color:var(--text-dim);font-size:14px;box-shadow:var(--shadow-sm)}
  .cover{width:52px;height:70px;border-radius:8px 3px 3px 8px;flex:none;position:relative;box-shadow:0 3px 10px rgba(45,49,66,.14);overflow:hidden}
  .cover::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:rgba(0,0,0,.12)}
  .cover .ti{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:11px;font-weight:600;color:rgba(255,255,255,.92);padding:6px;text-align:center;line-height:1.2}
  .bookrow{display:flex;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .12s}
  .bookrow:active{transform:scale(.985)}
  .bookrow .bi{flex:1;min-width:0}
  .bookrow .bt{font-family:var(--font-serif);font-size:18px;font-weight:600;line-height:1.2}
  .bookrow .ba{font-family:var(--font-serif);font-style:italic;font-size:12px;color:var(--text-dim);margin-top:2px}
  .bookrow .bm{display:flex;align-items:center;gap:8px;margin-top:11px;font-size:11px;color:var(--text-dim)}

  /* —— reading (immersive redesign: masthead · auto-hide chrome · floating dock · wax spine) —— */
  .reading{position:absolute;inset:0;z-index:30;background:var(--grad-paper);overflow:hidden}
  .rspine{position:absolute;left:0;top:0;bottom:0;width:3px;background:rgba(138,130,112,.16);z-index:5}
  .rspine i{position:absolute;left:0;top:0;width:100%;background:linear-gradient(180deg,var(--vk-gold),#B39053);border-radius:0 2px 2px 0;transition:height .12s linear}
  .rtop2{position:absolute;top:0;left:0;right:0;z-index:7;display:flex;align-items:center;gap:12px;padding:10px 14px 18px;background:linear-gradient(180deg,var(--vk-paper) 52%,rgba(251,248,241,0));transition:transform .3s var(--ease-out),opacity .3s}
  .reading.chrome-hidden .rtop2{transform:translateY(-102%);opacity:0}
  .rcircle{width:38px;height:38px;border-radius:50%;border:none;background:rgba(74,68,56,.07);color:var(--vk-ink);font-size:17px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center}
  .rtop2-title{flex:1;min-width:0;text-align:center;font-family:var(--font-serif);font-style:italic;font-size:14px;color:var(--vk-ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rbody{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:60px 26px 116px 32px}
  .rmast{margin:6px 0 26px}
  .rmast-k{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--vk-ink-dim);margin-bottom:12px}
  .rmast-t{font-family:var(--font-serif);font-size:33px;font-weight:600;line-height:1.12;color:var(--vk-ink);margin:0}
  .rmast-by{font-family:var(--font-serif);font-style:italic;font-size:14px;color:var(--vk-ink-dim);margin-top:8px}
  .rmast-voice{margin-top:16px;opacity:.7}
  .rmast-voice svg{height:20px}
  .rtext{font-family:var(--font-serif);color:var(--vk-ink);white-space:pre-wrap;word-break:break-word}
  .rmargins{margin-top:30px;display:flex;flex-direction:column;gap:12px}
  .rmargins .mh{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--vk-ink-dim);display:flex;align-items:center;gap:8px}
  .rmargins .mh::after{content:'';flex:1;height:1px;background:rgba(138,130,112,.28)}
  .rend{text-align:center;font-family:var(--font-serif);font-style:italic;color:var(--vk-ink-dim);font-size:13px;letter-spacing:3px;margin:32px 0 4px}
  .rdock{position:absolute;left:14px;right:14px;bottom:calc(var(--pb) + 12px);z-index:7;display:flex;align-items:center;gap:6px;background:var(--surface-solid);border:1px solid var(--border-hover);border-radius:var(--radius-pill);padding:7px 9px;box-shadow:var(--shadow-lg);transition:transform .3s var(--ease-out),opacity .3s}
  .reading.chrome-hidden .rdock{transform:translateY(calc(100% + var(--pb) + 26px));opacity:0}
  .dbtn{display:flex;flex-direction:column;align-items:center;gap:1px;border:none;background:none;color:var(--text-mid);font-size:15px;cursor:pointer;padding:4px 6px;font-family:inherit;min-width:42px}
  .dbtn span{font-size:9px;color:var(--text-faint);letter-spacing:.5px}
  .dbtn:disabled{opacity:.3}
  .dread{flex:1;border:none;border-radius:var(--radius-pill);background:var(--grad-accent);color:#fff;font-weight:600;font-size:14px;padding:11px;cursor:pointer;font-family:inherit;min-height:44px}
  .ddone{flex:1;text-align:center;color:#4f8f78;background:color-mix(in srgb,var(--mint) 20%,transparent);border-radius:var(--radius-pill);padding:11px;font-weight:600;font-size:14px}
  .navb{width:38px;height:38px;border-radius:12px;border:none;background:rgba(74,68,56,.06);color:var(--vk-ink);font-size:16px;cursor:pointer;flex:none}
  .navb:disabled{opacity:.35}
  .typebtn{width:52px;height:52px;border-radius:16px;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-family:var(--font-serif);font-size:20px;display:inline-flex;align-items:center;justify-content:center}
  .typebtn:active{background:var(--accent-soft)}
  .paperopt{width:50px;height:40px;border-radius:12px;border:1px solid var(--border);cursor:pointer;font-family:var(--font-serif);font-size:15px;display:inline-flex;align-items:center;justify-content:center;transition:.15s}
  .paperopt.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}

  /* —— generic bottom sheet —— */
  .mask{position:absolute;inset:0;z-index:60;background:rgba(28,30,46,.4);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .25s}
  .mask.show{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:61;background:var(--surface-solid);border-radius:22px 22px 0 0;border:1px solid var(--border);border-bottom:none;box-shadow:0 -8px 30px rgba(20,22,38,.18);transform:translateY(110%);transition:transform .28s var(--ease-out);padding:14px 18px calc(var(--pb) + 14px);max-height:78%;overflow-y:auto}
  .sheet.show{transform:translateY(0)}
  .grab{width:36px;height:4px;border-radius:2px;background:var(--border-hover);margin:2px auto 12px}
  .sheet h3{font-family:var(--font-serif);font-style:italic;font-size:18px;font-weight:600;margin:0 0 10px}
  .toc{display:flex;flex-direction:column;gap:2px}
  .nf-q{font-family:var(--font-serif);font-style:italic;font-size:14px;color:var(--text-mid);border-left:2px solid var(--accent-med);padding-left:10px;margin-bottom:10px}
  .nf-ta{width:100%;min-height:96px;resize:none;font-family:inherit;font-size:15px;line-height:1.6;color:var(--text);background:var(--snow);border:1px solid var(--snow-edge);border-radius:12px;padding:12px 14px;box-sizing:border-box}
  .nf-ta:focus{outline:none;border-color:var(--accent)}
  .nf-row{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;align-items:center}
  .nf-hint{margin-right:auto;font-size:11px;color:var(--text-faint)}

  /* —— selection bar —— */
  .selbar{position:absolute;left:16px;right:16px;bottom:calc(var(--pb) + 76px);z-index:40;display:flex;align-items:center;gap:10px;background:var(--surface-solid);border:1px solid var(--border-hover);border-radius:var(--radius-pill);padding:8px 10px 8px 16px;box-shadow:var(--shadow-lg);transform:translateY(160%);transition:transform .25s var(--ease-out)}
  .selbar.show{transform:translateY(0)}
  .selbar .q{flex:1;min-width:0;font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* —— letters tab —— */
  .letters{padding:6px 18px 24px;display:flex;flex-direction:column;gap:12px}
  .sealed{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,var(--surface),var(--vk-ice-soft));border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm);cursor:pointer}
  .sealed:active{transform:scale(.985)}
  .sealed .si{flex:1;min-width:0}
  .sealed .sf{font-size:14px;font-weight:600}
  .sealed .st{font-size:12px;color:var(--text-dim);margin-top:2px}
  .sealed .badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--accent-deep);background:var(--accent-soft);border-radius:999px;padding:2px 9px;margin-top:7px}
  .sealed .cta{writing-mode:vertical-rl;font-family:var(--font-serif);font-size:12px;letter-spacing:5px;color:var(--accent-deep);opacity:.85;padding-left:12px;border-left:1px dashed var(--border-hover);align-self:stretch;display:flex;align-items:center}

  /* —— me tab —— */
  .me{padding:14px 20px 24px;display:flex;flex-direction:column;gap:18px}
  .me-hero{display:flex;align-items:center;gap:16px}
  .me-av{width:66px;height:66px;border-radius:20px;box-shadow:var(--shadow);flex:none}
  .me-name{font-family:var(--font-serif);font-size:22px;font-weight:600}
  .me-sub{font-size:12px;color:var(--text-dim);font-style:italic;font-family:var(--font-serif);margin-top:2px}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center;box-shadow:var(--shadow-sm)}
  .stat .n{font-family:var(--font-serif);font-size:26px;font-weight:600;color:var(--accent-deep)}
  .stat .l{font-size:11px;color:var(--text-dim);margin-top:2px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)}
  .panel .pt{font-family:var(--font-serif);font-style:italic;font-size:15px;margin-bottom:12px}
  .streak{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

  /* —— ritual card overlay —— */
  .cardmask{position:absolute;inset:0;z-index:70;background:rgba(28,30,46,.5);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s}
  .cardmask.show{opacity:1;pointer-events:auto}
  .cardmask .cm-cap{color:#E8EAF6;font-family:var(--font-serif);font-style:italic;font-size:14px;text-align:center}

  .toast{position:absolute;left:50%;top:calc(var(--pt) + 14px);transform:translateX(-50%) translateY(-160%);z-index:80;background:var(--text);color:var(--bg);font-size:13px;padding:9px 18px;border-radius:999px;box-shadow:var(--shadow-lg);transition:transform .3s;max-width:88%;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../mitlesen-reader/data.js"></script>
<script type="text/babel" src="./mobile-app.jsx"></script>
</body>
</html>
