<!-- @dsCard group="Mitlesen Reader" viewport="1280x760" name="Reader — co-reading room" subtitle="Interactive: pick a book, read, highlight, annotate, mint a card" -->
<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>共读 · Mitlesen — Reader</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{height:100%}
  body{margin:0;background:var(--bg);background-image:var(--texture-dots);color:var(--text);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;overflow:hidden}
  h2{margin:0}
  .kit{height:100vh;display:flex;flex-direction:column;overflow:hidden}

  .topbar{height:var(--nav-h);display:flex;align-items:center;gap:12px;padding:0 14px;border-bottom:1px solid var(--border);background:var(--surface);backdrop-filter:blur(var(--blur-chrome));-webkit-backdrop-filter:blur(var(--blur-chrome));position:relative;z-index:30}
  .brand{font-family:var(--font-serif);font-weight:600;font-size:20px;letter-spacing:.5px;white-space:nowrap}
  .brand small{font-family:var(--font-sans);font-size:11px;letter-spacing:2px;color:var(--text-faint);text-transform:uppercase;margin-left:6px}
  .top-book{font-family:var(--font-serif);font-style:italic;color:var(--text-mid);font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
  .menu-btn{display:none}

  .app{flex:1;display:grid;grid-template-columns:var(--rail-width) 1fr;min-height:0}
  .rail{border-right:1px solid var(--border);overflow-y:auto;background:var(--grad-rail);padding:14px 12px 40px;min-height:0}
  .rail-head{display:flex;align-items:center;justify-content:space-between;margin:2px 4px 12px}
  .rail-head h2{font-family:var(--font-serif);font-size:19px;font-weight:600}
  .rail-actions{display:flex;gap:6px}
  .shelf{display:flex;flex-direction:column;gap:10px}
  .chapters{margin:8px 2px 6px;padding-left:6px;border-left:1px dashed var(--border-hover);display:flex;flex-direction:column;gap:2px}

  .reader{overflow-y:auto;min-height:0;display:flex;flex-direction:column;align-items:center;padding:22px 20px 140px}
  .reader-head{width:min(100%,var(--reading-measure));display:flex;align-items:flex-end;gap:12px;margin-bottom:14px}
  .chunk-title{font-family:var(--font-serif);font-size:24px;font-weight:600;line-height:1.2;flex:1;min-width:0}
  .r-actions{display:flex;gap:8px;flex:none}
  .sheet-wrap{width:min(100%,var(--reading-measure))}
  .sheet-foot{width:min(100%,var(--reading-measure));display:flex;justify-content:space-between;align-items:center;margin-top:14px;color:var(--text-dim);font-size:12px;font-style:italic;font-family:var(--font-serif)}
  .navbtn{font-size:13px;border:none;background:transparent;color:var(--accent-deep);cursor:pointer;font-family:inherit}
  .navbtn:disabled{color:var(--text-faint);cursor:default}
  .margins{width:min(100%,var(--reading-measure));margin-top:24px;display:flex;flex-direction:column;gap:12px}
  .margins-head{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);display:flex;align-items:center;gap:8px}
  .margins-head::after{content:'';flex:1;height:1px;background:var(--border)}

  .selbar{position:fixed;left:50%;bottom:calc(18px + var(--safe-b));transform:translateX(-50%) translateY(160%);display:flex;align-items:center;gap:10px;max-width:min(92vw,640px);background:var(--surface-solid);border:1px solid var(--border-hover);border-radius:var(--radius-pill);padding:8px 10px 8px 16px;box-shadow:var(--shadow-lg);z-index:40;transition:transform var(--dur) var(--ease-out)}
  .selbar.show{transform:translateX(-50%) translateY(0)}
  .sel-q{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:44vw}

  .noteform{position:fixed;inset:auto 0 0 0;z-index:50;background:var(--surface-solid);border-top:1px solid var(--border-hover);border-radius:20px 20px 0 0;box-shadow:var(--shadow-sheet-modal);padding:18px 18px calc(18px + var(--safe-b));transform:translateY(110%);transition:transform var(--dur) var(--ease-out);max-width:560px;margin:0 auto}
  .noteform.show{transform:translateY(0)}
  .nf-q{font-family:var(--font-serif);font-style:italic;font-size:14px;color:var(--text-mid);border-left:2px solid var(--accent-med);padding-left:10px;margin-bottom:10px;max-height:74px;overflow:auto}
  .noteform textarea{width:100%;min-height:88px;resize:vertical;font-family:inherit;font-size:15px;line-height:1.55;color:var(--text);background:var(--snow);border:1px solid var(--snow-edge);border-radius:12px;padding:11px 13px}
  .noteform textarea:focus{outline:none;border-color:var(--accent)}
  .nf-row{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;align-items:center}
  .nf-hint{margin-right:auto;font-size:11px;color:var(--text-faint)}

  .card-panel{position:fixed;z-index:55;top:calc(var(--nav-h) + 16px);right:20px;width:min(360px,calc(100vw - 40px));border:1px solid var(--border-hover);border-radius:24px;padding:16px;background:var(--surface);box-shadow:0 24px 80px rgba(36,31,24,.16);backdrop-filter:blur(var(--blur-panel));-webkit-backdrop-filter:blur(var(--blur-panel))}
  .card-panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
  .card-panel-head h2{font-family:var(--font-serif);font-size:20px;font-weight:600}
  .card-preview{display:flex;justify-content:center}
  .card-actions{display:flex;justify-content:flex-end;margin-top:14px}

  .toast-wrap{position:fixed;left:50%;top:18px;transform:translateX(-50%);z-index:60}

  .scrim{display:none}

  @media(max-width:880px){
    .menu-btn{display:inline-flex}
    .app{grid-template-columns:1fr}
    .rail{position:fixed;top:var(--nav-h);bottom:0;left:0;width:min(86vw,330px);z-index:25;transform:translateX(-102%);transition:transform var(--dur) var(--ease-out);box-shadow:var(--shadow-lg)}
    .rail.open{transform:translateX(0)}
    .scrim{display:block;position:fixed;inset:var(--nav-h) 0 0 0;background:rgba(20,22,38,.32);z-index:24}
    .reader{padding:18px 14px 140px}
    .reader-head{flex-wrap:wrap}.r-actions{order:3;width:100%}.r-actions>*{flex:1}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="./data.js"></script>
<script type="text/babel" src="./reader-app.jsx"></script>
</body>
</html>
