<!-- @dsCard group="Vorklang Letters" viewport="660x840" name="Mist 信纸 · 小烟的信" subtitle="小烟's warm star-and-mist stationery — the counterpart to 小奏's Kanon" -->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0}
  .desk{width:660px;min-height:840px;box-sizing:border-box;background:linear-gradient(160deg,#efe6da,#e6dccb);display:flex;align-items:center;justify-content:center;padding:40px 30px}
  /* Mist 信纸 — warm ivory, star-and-mist. Physical paper; theme-independent. */
  .mist{--mp:#FBF8F1;--mp2:#F3EEE2;--mi:#4A4438;--mi-soft:#8A8270;--mrule:#E9E1CD;--mrose:#B06B7A;--mgold:#C9A86A;--mhair:#E2D8C4;
    position:relative;width:560px;background:linear-gradient(180deg,var(--mp),var(--mp2));color:var(--mi);
    font-family:'Noto Serif SC','Songti SC',serif;padding:46px 44px 38px;border-radius:2px;
    box-shadow:0 1px 2px rgba(74,68,56,.08),0 16px 44px rgba(74,68,56,.20)}
  .stars{display:block;width:100%;height:38px}
  .head{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;padding-bottom:14px;border-bottom:1px solid var(--mhair)}
  .head .who{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;letter-spacing:.08em;color:var(--mi-soft)}
  .head .date{font-size:12px;letter-spacing:.18em;color:var(--mi-soft)}
  .body{margin-top:32px;font-size:16px;line-height:38px;text-align:justify;
    background:repeating-linear-gradient(to bottom,transparent 0,transparent 37px,var(--mrule) 37px,var(--mrule) 38px);background-position:0 6px}
  .body p{margin:0 0 38px}
  .body p:first-child{letter-spacing:.04em}
  .body p:last-child{margin-bottom:0}
  .sign{margin-top:44px;display:flex;flex-direction:column;align-items:flex-end;position:relative}
  .sign .cn{font-size:16px;letter-spacing:.12em}
  .sign .en{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:26px;color:var(--mrose);margin-top:2px}
  .seal{position:absolute;right:86px;bottom:-6px;width:58px;height:58px;border-radius:50%;
    background:radial-gradient(circle at 36% 32%,#E7A7B2,var(--mrose) 60%,#8E4E5C 100%);
    display:flex;align-items:center;justify-content:center;transform:rotate(6deg);
    box-shadow:0 2px 8px rgba(176,107,122,.42),inset 0 0 0 3px rgba(251,248,241,.55);opacity:.94}
  .seal svg{transform:rotate(-5deg)}
  .coda{margin-top:52px;padding-top:16px;border-top:1px solid var(--mhair)}
  .caption{margin-top:8px;display:flex;justify-content:space-between;font-size:11px;letter-spacing:.16em;color:#B7A99A}
  .caption .brand{font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:.1em;font-size:12px}
</style>
</head>
<body>
<div class="desk">
  <article class="mist">
    <svg class="stars" id="starsTop" viewBox="0 0 560 38" aria-hidden="true"></svg>
    <div class="head">
      <span class="who">Mist · 一封起雾的信</span>
      <span class="date">寄于 2026 . 7 . 18</span>
    </div>
    <div class="body">
      <p>小奏：</p>
      <p>你总把信写得像退潮——先走一步，留下渐弱的余韵。这回轮到我先起雾了：等你读到，雾里大概已经落了几颗星。我们换着当第一声部，也换着当先醒来的那个。</p>
      <p>没什么要紧的。今天狗睡了一下午，我把没读完的那章折了角，留着等你。</p>
    </div>
    <div class="sign">
      <span class="cn">你的小烟</span>
      <span class="en">Mist</span>
      <div class="seal">
        <svg viewBox="0 0 40 40" width="30" height="30" aria-hidden="true">
          <g fill="#FBF7EE">
            <path d="M20 6 L22.4 17.6 L34 20 L22.4 22.4 L20 34 L17.6 22.4 L6 20 L17.6 17.6 Z"/>
            <circle cx="30" cy="10" r="1.5" opacity=".9"/>
            <circle cx="10.5" cy="28" r="1.2" opacity=".7"/>
            <circle cx="31" cy="30" r="1" opacity=".55"/>
          </g>
        </svg>
      </div>
    </div>
    <div class="coda">
      <svg class="stars" id="starsCoda" viewBox="0 0 560 38" aria-hidden="true"></svg>
      <div class="caption">
        <span>雾会散，折痕不散</span>
        <span class="brand">Mist × Kanon</span>
      </div>
    </div>
  </article>
</div>
<script>
  // A 4-point star (mist's motif) — the warm counterpart to Kanon's canon dots.
  function star(cx, cy, k, fill, op) {
    return `<path transform="translate(${cx} ${cy}) scale(${k})" d="M0 -6 L1.7 -1.7 L6 0 L1.7 1.7 L0 6 L-1.7 1.7 L-6 0 L-1.7 -1.7 Z" fill="${fill}" opacity="${op}"/>`;
  }
  var ROSE = "#B06B7A", GOLD = "#C9A86A";
  // header: stars appearing (a small constellation)
  var top = [[26,20,1.1,GOLD,.9],[90,10,.7,ROSE,.7],[150,24,.85,ROSE,.85],[214,14,.6,GOLD,.6],
             [300,22,1,GOLD,.85],[370,10,.75,ROSE,.7],[440,20,.9,GOLD,.8],[512,14,.65,ROSE,.6]];
  document.getElementById("starsTop").innerHTML = top.map(function(s){return star.apply(null,s);}).join("");
  // coda: the same scatter, dimming to nothing — the visual余韵 (echo)
  var coda = [[150,12,.9,ROSE,.85],[214,22,.8,GOLD,.68],[300,14,.75,ROSE,.5],
              [370,24,.7,GOLD,.36],[440,16,.65,ROSE,.22],[512,22,.6,GOLD,.12]];
  document.getElementById("starsCoda").innerHTML = coda.map(function(s){return star.apply(null,s);}).join("");
</script>
</body>
</html>
